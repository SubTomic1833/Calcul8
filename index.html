<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul8</title>
    <style>
        body{
            font-family: "Inter", sans-serif;
            background-color: #66635b;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }
        .calculator{
            background-color: #333;
            width:320px;
            height:440px;
            padding:23px;
            border-radius:10px;
            border:1px solid white;
            box-shadow:5px 5px 5px rgba(0,0,0,0.3);
        }
        .container{
            display:flex;
            flex-direction: column;
            align-items:center;
            transform:translateY(-50px);
        }
        .title{
            margin-bottom:40px;
            font-size:60px;
            font-weight:bold;
            color:#ffffff;
            letter-spacing: 2px;
        }
        #display{
            width:100%;
            height:75px;
            background-color:#fff;
            font-size:30px;
            text-align:right;
            padding:5px;
            box-sizing:border-box;
            margin-bottom:20px;
            border:2px solid #999;
            border-radius:15px;
        }
        .buttons{
            display:grid;
            grid-template-columns: repeat(4,60px);
            row-gap:10px;
            column-gap:20px;
        }
        button{
            width:60px;
            height:60px;
            font-size: 25px;
            cursor:pointer;
            background-color: #eee;
            border:none;
            border-radius:20px;
            box-shadow: 0 4px 0 #999;
            transition:transform 0.05s, box-shadow 0.05s;
        }
        button:hover{
            background-color: #ddd;
        }
        button:active{
            transform:translateY(4px);
            box-shadow: 0 0 0 #999
        }
        .operator{
            background-color:#ff9500;
        }
        .operator:hover{
            background-color: #e08400;
        }
        .clear{
            background-color: #ff3b30;
        }
        .clear:hover{
            background-color: #d32f2f;
        }
    </style>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
        <audio id="clickSound" src="click2.mp3"></audio>
        <div class="container">
            <h1 class="title">Calcul8</h1>
            <div class="calculator">
                <input type="text" id="display" readonly value="0">

                <div class="buttons">
                    <button class="clear" onclick="clearDisplay()">C</button>
                    <button onclick="pressNum('/')" class="operator">/</button>
                    <button onclick="pressNum('*')" class="operator">*</button>
                    <button onclick="pressNum('-')" class="operator">-</button>

                    <button onclick="pressNum('7')">7</button>
                    <button onclick="pressNum('8')">8</button>
                    <button onclick="pressNum('9')">9</button>
                    <button onclick="pressNum('+')" class="operator">+</button>

                    <button onclick="pressNum('4')">4</button>
                    <button onclick="pressNum('5')">5</button>
                    <button onclick="pressNum('6')">6</button>
                    <button style="visibility: hidden;"></button>

                    <button onclick="pressNum('1')">1</button>
                    <button onclick="pressNum('2')">2</button>
                    <button onclick="pressNum('3')">3</button>
                    <button onclick="calculate()" class="operator" style="grid-row: span 2;height: 130px;">=</button>
                
                    <button onclick="pressNum('0')" style="grid-column: span 2; width: 130px;">0</button>
                    <button onclick="pressNum('.')">.</button>
                </div>
            </div>
        </div>
        <script>
            var display=document.getElementById("display");
            var clickSound=document.getElementById("clickSound");
            function playCSound(){
                clickSound.currentTime=0;
                clickSound.play();
            }
            function pressNum(x){
                playCSound();
                if(display.value==="0"){
                    display.value=x;
                }else{
                    display.value=display.value+x;
                }
            }
            function clearDisplay(){
                playCSound();
                display.value="0";
            }
            function calculate(){
                playCSound();
                try{
                    display.value=eval(display.value);
                }catch(err){
                    display.value="Error";
                }
            }
        </script>
    </head>
</html>
